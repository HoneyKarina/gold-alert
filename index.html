<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Alert - Live Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: #666;
      font-size: 1.1em;
    }
    
    .price-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 15px;
      padding: 30px;
      margin: 20px 0;
      text-align: center;
      color: white;
    }
    
    .price-label {
      font-size: 1em;
      opacity: 0.9;
      margin-bottom: 10px;
    }
    
    .price-value {
      font-size: 3em;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .price-change {
      font-size: 1.2em;
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
    }
    
    .price-up {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }
    
    .price-down {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 20px 0;
    }
    
    .info-item {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    
    .info-label {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 5px;
    }
    
    .info-value {
      font-size: 1.3em;
      font-weight: bold;
      color: #333;
    }
    
    .alert-form {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #f0f0f0;
    }
    
    .form-title {
      font-size: 1.3em;
      margin-bottom: 20px;
      color: #333;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: #666;
      font-size: 0.9em;
    }
    
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .footer {
      margin-top: 30px;
      text-align: center;
      color: #999;
      font-size: 0.9em;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
    }
    
    .loading {
      opacity: 0.6;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .updating {
      animation: pulse 1s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔔 Gold Alert</h1>
      <p class="subtitle">Real-time Gold Price Monitoring</p>
    </div>
    
    <div class="price-card" id="priceCard">
      <div class="price-label">Gold Price (USD/oz)</div>
      <div class="price-value" id="priceValue">$3,022.50</div>
      <div class="price-change price-up" id="priceChange">
        ↑ +0.95% (+$28.50)
      </div>
    </div>
    
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">24h High</div>
        <div class="info-value" id="highPrice">$3,030</div>
      </div>
      <div class="info-item">
        <div class="info-label">24h Low</div>
        <div class="info-value" id="lowPrice">$2,990</div>
      </div>
      <div class="info-item">
        <div class="info-label">Last Update</div>
        <div class="info-value" id="lastUpdate">Just now</div>
      </div>
      <div class="info-item">
        <div class="info-label">Data Source</div>
        <div class="info-value">Kitco</div>
      </div>
    </div>
    
    <div class="alert-form">
      <h3 class="form-title">📊 Set Price Alert</h3>
      <div class="form-group">
        <label>Alert Type</label>
        <select id="alertType">
          <option value="below">Alert when price drops below</option>
          <option value="above">Alert when price rises above</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target Price (USD)</label>
        <input type="number" id="targetPrice" placeholder="e.g., 3000" step="0.01">
      </div>
      <button onclick="setAlert()">🔔 Set Alert</button>
    </div>
    
    <div class="footer">
      <p>Made with ❤️ by <a href="https://github.com/HoneyKarina/gold-alert" target="_blank">Karina</a></p>
      <p>⭐ Star on GitHub | 💖 Sponsor</p>
    </div>
  </div>
  
  <script>
    // 模拟数据（实际使用时从 API 获取）
    let currentPrice = 3022.50;
    let previousPrice = 2994.00;
    
    // 更新价格显示
    function updatePriceDisplay() {
      const change = currentPrice - previousPrice;
      const changePercent = ((change / previousPrice) * 100).toFixed(2);
      
      document.getElementById('priceValue').textContent = 
        `$${currentPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      
      const changeElement = document.getElementById('priceChange');
      const changeText = change >= 0 
        ? `↑ +${changePercent}% (+$${Math.abs(change).toFixed(2)})`
        : `↓ ${changePercent}% (-$${Math.abs(change).toFixed(2)})`;
      
      changeElement.textContent = changeText;
      changeElement.className = `price-change ${change >= 0 ? 'price-up' : 'price-down'}`;
    }
    
    // 设置提醒
    function setAlert() {
      const type = document.getElementById('alertType').value;
      const target = parseFloat(document.getElementById('targetPrice').value);
      
      if (!target || target <= 0) {
        alert('Please enter a valid price');
        return;
      }
      
      const message = type === 'below'
        ? `✅ Alert set! We'll notify you when gold drops below $${target}`
        : `✅ Alert set! We'll notify you when gold rises above $${target}`;
      
      alert(message);
      
      // 实际使用时，这里会调用后端 API 保存提醒
      console.log('Alert set:', { type, target, currentPrice });
    }
    
    // 模拟价格更新
    function simulatePriceUpdate() {
      const variation = (Math.random() - 0.5) * 10; // -5 to +5
      previousPrice = currentPrice;
      currentPrice = Math.max(2900, currentPrice + variation);
      updatePriceDisplay();
      
      // 更新时间
      const now = new Date();
      document.getElementById('lastUpdate').textContent = 
        now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    
    // 初始化
    updatePriceDisplay();
    
    // 每5秒更新一次价格（演示用）
    setInterval(simulatePriceUpdate, 5000);
  </script>
</body>
</html>
